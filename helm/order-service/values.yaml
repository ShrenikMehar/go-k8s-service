name: order-service
namespace: dev

image:
  repository: shrenikmehar/order-service
  tag: latest

replicas: 1

port:
  container: 8080
  service: 80

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPU: 10

config:
  PORT: "8080"

secret:
  DB_PASSWORD: ""
