name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Test order-service
        run: cd order-service && go test ./...

      - name: Test payment-service
        run: cd payment-service && go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build order-service image
        run: docker build -t order-service:v1 -f order-service/Dockerfile .

      - name: Build payment-service image
        run: docker build -t payment-service:v1 -f payment-service/Dockerfile .
